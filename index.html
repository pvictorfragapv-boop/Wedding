  <style>
    :root {
      --marrom:        #1E0A08;
      --marrom-medio:  #3D1810;
      --marrom-claro:  #7A3520;
      --creme:         #F3EBE0;
      --creme-escuro:  #E2D0BB;
      --dourado:       #C9A96E;
      --dourado-claro: #E8D4A8;
      --branco:        #FAF6F0;
      --neblina:       rgba(243,235,224,0.07);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--branco);
      color: var(--marrom);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MOUNTAIN SVG BG \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .mountain-bg {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      opacity: 0.18;
      pointer-events: none;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HERO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #hero {
      min-height: 100vh;
      background: var(--marrom);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 100px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 10%, rgba(201,169,110,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 100% 40% at 50% 100%, rgba(61,24,16,0.8) 0%, transparent 70%);
    }
